<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peptide Smart Pro</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Peptide Smart Pro">
<link rel="apple-touch-icon" href="logo.png">

<link rel="manifest" href="manifest.json?v=3">
<meta name="theme-color" content="#0f172a">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a,#064e3b);
  color:white;
}
.container{
  max-width:430px;
  margin:auto;
  padding:20px;
}
.logo-wrap{
  text-align:center;
  margin-top:20px;
}
.logo{
  width:120px;
  border-radius:25px;
  animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 0 20px #22c55e);
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}
h1{
  text-align:center;
  margin:10px 0 0;
  font-size:30px;
}
.subtitle{
  text-align:center;
  color:#86efac;
  letter-spacing:2px;
  font-size:13px;
}
.card{
  background:rgba(15,23,42,.9);
  border:1px solid rgba(34,197,94,.25);
  border-radius:22px;
  padding:20px;
  margin-top:18px;
  box-shadow:0 0 25px rgba(34,197,94,.12);
}
label{
  display:block;
  margin-top:15px;
  color:#5eead4;
  font-weight:bold;
}
input,select,button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:14px;
  border:1px solid rgba(94,234,212,.25);
  font-size:16px;
}
input,select{
  background:#020617;
  color:white;
}
button{
  background:linear-gradient(135deg,#22c55e,#84cc16);
  color:black;
  font-weight:bold;
  border:none;
}
.secondary{
  background:#0f172a;
  color:#86efac;
  border:1px solid rgba(34,197,94,.35);
}
.result{
  margin-top:18px;
  line-height:1.8;
  background:#020617;
  padding:16px;
  border-radius:18px;
}
.row{
  display:flex;
  gap:10px;
}
.row button{
  flex:1;
}
</style>
</head>

<body>

<div class="container">

<div class="logo-wrap">
<img src="logo.png" class="logo">
<h1>Peptide Smart Pro</h1>
<div class="subtitle">WATER • DOSE • UNITS</div>
</div>

<div class="card">

<label>Total peptide (mg)</label>
<input id="total" type="number" placeholder="15">

<label>Desired dose (mg)</label>
<input id="dose" type="number" placeholder="2">

<label>Mode</label>
<select id="mode">
<option value="smart">Smart recommended units</option>
<option value="manual">Manual</option>
</select>

<label>Units (U-100)</label>
<select id="units">
<option value="10">10</option>
<option value="20" selected>20</option>
<option value="30">30</option>
<option value="40">40</option>
</select>

<button onclick="calc()">🧮 Calculate</button>

<div class="row">
<button class="secondary" onclick="copyResult()">Copy</button>
<button class="secondary" onclick="clearAll()">Clear</button>
</div>

<div class="result" id="result">
Enter values and press Calculate.
</div>

</div>

</div>

<script>
function smartUnits(d){
  if(d<=0.5) return 10;
  if(d<=1) return 15;
  if(d<=2) return 20;
  if(d<=5) return 30;
  return 40;
}

let last="";

function calc(){
  let total=parseFloat(totalEl.value);
  let dose=parseFloat(doseEl.value);
  let mode=modeEl.value;
  let units=parseFloat(unitsEl.value);

  if(!total||!dose){
    result.innerHTML="Enter valid values";
    return;
  }

  if(mode==="smart"){
    units=smartUnits(dose);
  }

  let ml=units/100;
  let conc=dose/ml;
  let water=total/conc;

  last=`Water: ${water.toFixed(2)} ml
Concentration: ${conc.toFixed(2)} mg/ml
Dose: ${ml.toFixed(2)} ml (${units} units)`;

  result.innerHTML=
    "💧 Water: "+water.toFixed(2)+" ml<br>"+
    "📊 Concentration: "+conc.toFixed(2)+" mg/ml<br>"+
    "💉 Dose: "+ml.toFixed(2)+" ml ("+units+" units)";
}

function copyResult(){
  if(!last) return;
  navigator.clipboard.writeText(last);
}

function clearAll(){
  totalEl.value="";
  doseEl.value="";
  result.innerHTML="Enter values and press Calculate.";
}

const totalEl=document.getElementById("total");
const doseEl=document.getElementById("dose");
const modeEl=document.getElementById("mode");
const unitsEl=document.getElementById("units");
const result=document.getElementById("result");
</script>

</body>
</html>
