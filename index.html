<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peptide Smart Pro</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Peptide Smart Pro">
<link rel="apple-touch-icon" href="logo.png">

<link rel="manifest" href="manifest.json?v=2">
<meta name="theme-color" content="#0f172a">

<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:linear-gradient(135deg,#020617,#0f172a,#064e3b);
  color:white;
}
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}
.logo-wrap{
  text-align:center;
  margin-top:20px;
}
.logo{
  width:120px;
  border-radius:20px;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}
h1{
  text-align:center;
  margin-top:10px;
}
.card{
  background:#111827;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}
input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}
input,select{
  background:#020617;
  color:white;
}
button{
  background:#22c55e;
  color:black;
  font-weight:bold;
}
.result{
  margin-top:15px;
  background:#020617;
  padding:15px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo-wrap">
<img src="logo.png" class="logo">
<h1>Peptide Smart Pro</h1>
</div>

<div class="card">

<input id="total" type="number" placeholder="Total mg (e.g. 15)">
<input id="dose" type="number" placeholder="Dose mg (e.g. 2)">

<select id="mode">
<option value="smart">Smart mode</option>
<option value="manual">Manual mode</option>
</select>

<select id="units">
<option value="10">10 units</option>
<option value="20" selected>20 units</option>
<option value="30">30 units</option>
<option value="40">40 units</option>
</select>

<button onclick="calc()">Calculate</button>

<div class="result" id="result">
Enter values and press Calculate
</div>

</div>

</div>

<script>
function smartUnits(dose){
  if(dose<=0.5) return 10;
  if(dose<=1) return 15;
  if(dose<=2) return 20;
  if(dose<=5) return 30;
  return 40;
}

function calc(){
  let total=parseFloat(document.getElementById("total").value);
  let dose=parseFloat(document.getElementById("dose").value);
  let mode=document.getElementById("mode").value;
  let units=parseFloat(document.getElementById("units").value);

  if(!total||!dose){
    result.innerHTML="Enter valid values";
    return;
  }

  if(mode==="smart"){
    units=smartUnits(dose);
  }

  let doseMl=units/100;
  let concentration=dose/doseMl;
  let water=total/concentration;

  result.innerHTML=
    "Water: "+water.toFixed(2)+" ml<br>"+
    "Concentration: "+concentration.toFixed(2)+" mg/ml<br>"+
    "Dose: "+doseMl.toFixed(2)+" ml ("+units+" units)";
}
</script>

</body>
</html>
