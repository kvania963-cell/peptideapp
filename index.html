<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peptide Smart Pro</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Peptide Smart Pro">
<link rel="apple-touch-icon" href="logo.png">

<link rel="manifest" href="manifest.json?v=5">
<meta name="theme-color" content="#0f172a">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a,#064e3b);
  color:white;
}
.container{
  max-width:430px;
  margin:auto;
  padding:20px;
}
.logo-wrap{
  text-align:center;
  margin-top:20px;
}
.logo{
  width:120px;
  border-radius:25px;
  animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 0 20px #22c55e);
}
@keyframes float{
  50%{transform:translateY(-8px)}
}
h1{text-align:center;margin:10px 0 0}
.subtitle{text-align:center;color:#86efac;font-size:13px;letter-spacing:2px}
.card{
  background:rgba(15,23,42,.9);
  border-radius:22px;
  padding:20px;
  margin-top:18px;
}
label{
  display:block;
  margin-top:15px;
  color:#5eead4;
}
input,select,button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:14px;
  border:none;
}
input,select{background:#020617;color:white}
button{
  background:linear-gradient(135deg,#22c55e,#84cc16);
  font-weight:bold;
}
.secondary{
  background:#0f172a;
  color:#86efac;
}
.result{
  margin-top:18px;
  background:#020617;
  padding:16px;
  border-radius:18px;
}
.row{display:flex;gap:10px}
.row button{flex:1}
.history{font-size:13px;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<div class="logo-wrap">
<img src="logo.png" class="logo">
<h1>Peptide Smart Pro</h1>
<div class="subtitle">WATER • DOSE • UNITS</div>
</div>

<div class="card">

<label>Preset</label>
<select id="preset">
<option value="">Custom</option>
<option value="5">5 mg</option>
<option value="10">10 mg</option>
<option value="15">15 mg</option>
<option value="30">30 mg</option>
<option value="50">50 mg</option>
<option value="100">100 mg</option>
</select>

<label>Total peptide (mg)</label>
<input id="total" type="number">

<label>Desired dose (mg)</label>
<input id="dose" type="number">

<label>Mode</label>
<select id="mode">
<option value="smart">Smart</option>
<option value="manual">Manual</option>
</select>

<label>Units</label>
<select id="units">
<option value="10">10</option>
<option value="20" selected>20</option>
<option value="30">30</option>
<option value="40">40</option>
</select>

<button onclick="calc()">Calculate</button>

<div class="row">
<button class="secondary" onclick="copyResult()">Copy</button>
<button class="secondary" onclick="clearAll()">Clear</button>
</div>

<div class="result" id="result">
Enter values and press Calculate
</div>

</div>

<div class="card">
<label>History</label>
<div id="history" class="history">No history yet.</div>
</div>

</div>

<script>
document.getElementById("preset").onchange=function(){
  let v=this.value;
  if(v) total.value=v;
};

function smartUnits(d){
  if(d<=0.5) return 10;
  if(d<=1) return 15;
  if(d<=2) return 20;
  if(d<=5) return 30;
  return 40;
}

function suggestWater(total){
  if(total<=5) return 0.5;
  if(total<=10) return 1;
  if(total<=20) return 2;
  if(total<=50) return 2;
  return 3;
}

let last="";

function calc(){
  let t=parseFloat(total.value);
  let d=parseFloat(dose.value);
  let m=mode.value;
  let u=parseFloat(units.value);

  if(!t||!d){result.innerHTML="Enter values";return;}

  if(m==="smart"){u=smartUnits(d);}

  let ml=u/100;
  let conc=d/ml;
  let water=t/conc;
  let suggested=suggestWater(t);

  last=`Water: ${water.toFixed(2)} ml | Dose: ${ml.toFixed(2)} ml (${u}u)`;

  result.innerHTML=
    "💧 Exact water: "+water.toFixed(2)+" ml<br>"+
    "🧠 Suggested water: "+suggested+" ml<br>"+
    "📊 Concentration: "+conc.toFixed(2)+" mg/ml<br>"+
    "💉 Dose: "+ml.toFixed(2)+" ml ("+u+" units)";

  saveHistory(last);
  loadHistory();
}

function saveHistory(x){
  let h=JSON.parse(localStorage.getItem("h")||"[]");
  h.unshift(x);
  h=h.slice(0,5);
  localStorage.setItem("h",JSON.stringify(h));
}

function loadHistory(){
  let h=JSON.parse(localStorage.getItem("h")||"[]");
  history.innerHTML=h.length?h.map((x,i)=>"#"+(i+1)+"<br>"+x).join("<br><br>"):"No history yet.";
}

function copyResult(){
  if(last) navigator.clipboard.writeText(last);
}

function clearAll(){
  total.value="";
  dose.value="";
  result.innerHTML="Enter values and press Calculate";
}

window.onload=loadHistory;
</script>

</body>
</html>
